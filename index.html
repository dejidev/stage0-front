<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <main>
        <article data-testid="test-todo-card" class="card" role="region" aria-labelledby="title">

            <header class="top">
                <h2 data-testid="test-todo-title" id="title">Finish Frontend Task</h2>

                <span data-testid="test-todo-priority" class="badge high" aria-label="High priority">
                    🔥 High
                </span>
            </header>

            <p data-testid="test-todo-description" class="desc">
                Build a beautiful, accessible, and testable todo card with perfect UX.
            </p>

            <div class="time-row">
                <time data-testid="test-todo-due-date" id="dueDate"></time>
                <time data-testid="test-todo-time-remaining" id="timeRemaining" aria-live="polite"></time>
            </div>

            <div class="status-row">
                <span data-testid="test-todo-status" id="status" class="status pending">
                    ⏳ Pending
                </span>
            </div>

            <div class="checkbox-row">
                <input type="checkbox" id="complete" data-testid="test-todo-complete-toggle" />
                <label for="complete">Mark as complete</label>
            </div>

            <div data-testid="test-todo-tags" class="tags" role="list">
                <span data-testid="test-todo-tag-work" class="tag" role="listitem">💼 work</span>
                <span data-testid="test-todo-tag-urgent" class="tag urgent" role="listitem">⚡ urgent</span>
                <span class="tag" role="listitem">🎨 design</span>
            </div>

            <footer class="actions">
                <button data-testid="test-todo-edit-button" id="editBtn">✏️ Edit</button>
                <button data-testid="test-todo-delete-button" id="deleteBtn">🗑 Delete</button>
            </footer>

        </article>
    </main>

    <script src="script.js"></script>
</body>

</html>
